name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install @steambalance/booster-framework from GitHub Packages. The
      # repo .npmrc routes the @steambalance scope; NODE_AUTH_TOKEN provides
      # read:packages auth via the built-in GITHUB_TOKEN.
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install

      - name: Run tests
        run: bun test
